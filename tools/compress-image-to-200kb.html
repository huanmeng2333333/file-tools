<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>图片压缩到200KB｜在线压缩照片到200K左右</title>
    <meta name="description" content="上传图片并压缩到200KB左右，适合证件照、资料上传、网页图片和表单附件。浏览器本地压缩。">
    <link rel="stylesheet" href="../assets/styles.css">
  </head>
  <body data-target="200">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="../index.html">文件轻工具</a>
        <nav class="nav" aria-label="主要导航">
          <a href="../index.html">首页</a>
          <a href="#tool">开始压缩</a>
          <a href="#faq">常见问题</a>
        </nav>
      </div>
    </header>

    <main class="page">
      <section class="hero">
        <div>
          <h1>图片压缩到200KB</h1>
          <p>把照片压缩到 200KB 左右，适合资料上传、证件照、网页图片和常见表单附件。</p>
        </div>
        <div class="visual" aria-hidden="true">
          <div class="visual-stack">
            <div class="visual-row"><span>常用场景</span><strong>资料上传</strong></div>
            <div class="visual-row"><span>目标大小</span><strong>200KB</strong></div>
            <div class="visual-row"><span>输出格式</span><strong>JPG/WEBP</strong></div>
          </div>
        </div>
      </section>

      <section id="tool" class="tool-shell" aria-label="图片压缩到200KB工具">
        <div class="panel">
          <div class="dropzone">
            <label>
              <strong>选择图片</strong>
              <span>图片只在你的浏览器里处理。</span>
              <input id="image-file" type="file" accept="image/*">
            </label>
          </div>
          <div class="controls">
            <label>目标大小<input id="target-kb" type="number" min="10" max="5000" value="200"></label>
            <label>最大宽度<input id="max-width" type="number" min="200" max="4000" value="1600"></label>
            <label>输出格式<select id="format"><option value="image/jpeg">JPG</option><option value="image/webp">WEBP</option></select></label>
          </div>
          <p id="status" class="status" role="status"></p>
          <button id="compress-button" type="button">开始压缩</button>
        </div>
        <aside id="result" class="result" hidden aria-live="polite"></aside>
      </section>

      <section id="faq" class="section">
        <h2>压缩到200KB会不会模糊？</h2>
        <p>普通证件照和资料图通常够用。若细节太多，可以改用 500KB 或降低最大宽度后重试。</p>
      </section>
    </main>
    <script src="../assets/compress.js"></script>
  </body>
</html>
