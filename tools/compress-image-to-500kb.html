<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>图片压缩到500KB｜在线压缩高清照片到500K以内</title>
    <meta name="description" content="把高清照片压缩到500KB左右，兼顾清晰度和上传体积。支持 JPG、PNG、WEBP 图片本地处理。">
    <link rel="stylesheet" href="../assets/styles.css">
  </head>
  <body data-target="500">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="../index.html">文件轻工具</a>
        <nav class="nav" aria-label="主要导航">
          <a href="../index.html">首页</a>
          <a href="#tool">开始压缩</a>
          <a href="#faq">常见问题</a>
        </nav>
      </div>
    </header>

    <main class="page">
      <section class="hero">
        <div>
          <h1>图片压缩到500KB</h1>
          <p>把高清照片压缩到 500KB 左右，适合需要保留清晰度但限制上传大小的场景。</p>
        </div>
        <div class="visual" aria-hidden="true">
          <div class="visual-stack">
            <div class="visual-row"><span>常用场景</span><strong>高清上传</strong></div>
            <div class="visual-row"><span>目标大小</span><strong>500KB</strong></div>
            <div class="visual-row"><span>处理方式</span><strong>本地压缩</strong></div>
          </div>
        </div>
      </section>

      <section id="tool" class="tool-shell" aria-label="图片压缩到500KB工具">
        <div class="panel">
          <div class="dropzone">
            <label>
              <strong>选择图片</strong>
              <span>图片只在你的浏览器里处理。</span>
              <input id="image-file" type="file" accept="image/*">
            </label>
          </div>
          <div class="controls">
            <label>目标大小<input id="target-kb" type="number" min="10" max="5000" value="500"></label>
            <label>最大宽度<input id="max-width" type="number" min="200" max="4000" value="2000"></label>
            <label>输出格式<select id="format"><option value="image/jpeg">JPG</option><option value="image/webp">WEBP</option></select></label>
          </div>
          <p id="status" class="status" role="status"></p>
          <button id="compress-button" type="button">开始压缩</button>
        </div>
        <aside id="result" class="result" hidden aria-live="polite"></aside>
      </section>

      <section id="faq" class="section">
        <h2>500KB适合什么情况？</h2>
        <p>适合照片本身较大、又希望保留更多清晰度的场景。若上传限制更小，可以改用 100KB 或 200KB。</p>
      </section>
    </main>
    <script src="../assets/compress.js"></script>
  </body>
</html>
